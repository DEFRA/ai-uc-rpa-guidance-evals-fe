name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  security-scan:
    name: Security Scanning
    uses: ./.github/workflows/scan.yaml
    secrets: inherit

  pr-validator:
    name: Run Pull Request Checks
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Test Docker Image Build
        run: |
          set +e
          docker build --no-cache --tag ai-uc-rpa-guidance-evals-fe .
          exit $?
        